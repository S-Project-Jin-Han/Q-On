name: Vercel Build Test

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  vercel-build:
    if: github.repository == 'S-Project-Jin-Han/Q-On'
    runs-on: ubuntu-latest
    environment: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment Info (preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Vercel Build (preview)
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build output listing (for debugging)
        if: always()
        run: ls -al .vercel/output || echo "No build output found"
